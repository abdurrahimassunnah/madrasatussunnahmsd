
<!DOCTYPE html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <script>
      window.addEventListener('error', function(e) {
        // Ignore benign WebSocket/Vite errors in dev environment
        if (e.message && (e.message.indexOf('WebSocket') !== -1 || e.message.indexOf('websocket') !== -1 || e.message.indexOf('vite') !== -1)) {
          return;
        }
        var errorDiv = document.createElement('div');
        errorDiv.style.position = 'fixed';
        errorDiv.style.top = '0';
        errorDiv.style.left = '0';
        errorDiv.style.width = '100vw';
        errorDiv.style.height = '100vh';
        errorDiv.style.backgroundColor = '#fdf2f2';
        errorDiv.style.color = '#9b1c1c';
        errorDiv.style.padding = '30px';
        errorDiv.style.zIndex = '9999999';
        errorDiv.style.overflow = 'auto';
        errorDiv.style.fontFamily = 'monospace';
        errorDiv.style.fontSize = '14px';
        errorDiv.style.lineHeight = '1.5';
        errorDiv.innerHTML = '<h1 style="font-size: 24px; font-weight: bold; margin-bottom: 15px;">Browser Runtime Error Captured</h1>' +
          '<div style="background-color: white; border: 1px solid #f5c2c2; padding: 20px; border-radius: 8px; margin-bottom: 15px; font-weight: bold;">' + e.message + '</div>' +
          '<div style="background-color: white; border: 1px solid #f5c2c2; padding: 20px; border-radius: 8px;"><strong>File:</strong> ' + e.filename + ' | <strong>Line:</strong> ' + e.lineno + ' | <strong>Col:</strong> ' + e.colno + '</div>' +
          (e.error && e.error.stack ? '<pre style="margin-top: 15px; padding: 15px; background: #2d3748; color: #a0aec0; border-radius: 8px; overflow-x: auto;">' + e.error.stack + '</pre>' : '');
        document.body.appendChild(errorDiv);
      });
      window.addEventListener('unhandledrejection', function(e) {
        var reasonStr = String(e.reason);
        // Ignore benign WebSocket/Vite errors in dev environment
        if (reasonStr && (reasonStr.indexOf('WebSocket') !== -1 || reasonStr.indexOf('websocket') !== -1 || reasonStr.indexOf('vite') !== -1)) {
          return;
        }
        var errorDiv = document.createElement('div');
        errorDiv.style.position = 'fixed';
        errorDiv.style.top = '0';
        errorDiv.style.left = '0';
        errorDiv.style.width = '100vw';
        errorDiv.style.height = '100vh';
        errorDiv.style.backgroundColor = '#fdf2f2';
        errorDiv.style.color = '#9b1c1c';
        errorDiv.style.padding = '30px';
        errorDiv.style.zIndex = '9999999';
        errorDiv.style.overflow = 'auto';
        errorDiv.style.fontFamily = 'monospace';
        errorDiv.style.fontSize = '14px';
        errorDiv.style.lineHeight = '1.5';
        errorDiv.innerHTML = '<h1 style="font-size: 24px; font-weight: bold; margin-bottom: 15px;">Unhandled Promise Rejection Captured</h1>' +
          '<div style="background-color: white; border: 1px solid #f5c2c2; padding: 20px; border-radius: 8px; margin-bottom: 15px; font-weight: bold;">' + e.reason + '</div>' +
          (e.reason && e.reason.stack ? '<pre style="margin-top: 15px; padding: 15px; background: #2d3748; color: #a0aec0; border-radius: 8px; overflow-x: auto;">' + e.reason.stack + '</pre>' : '');
        document.body.appendChild(errorDiv);
      });
    </script>
